  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "ring_125"
  uo[1]: "ring_251"
  uo[2]: "ring_501"
  uo[3]: "ring_1001"
  uo[4]: "c1_3"
  uo[5]: "c2_3"
  uo[6]: "ring_3"
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

