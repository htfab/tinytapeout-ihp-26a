# Tiny Tapeout project information
project:
  title:        "UART-Programmable 2-Tap FIR Filter"
  author:       "Mert Erman"
  discord:      ""
  description:  "2-tap direct-form FIR filter with runtime-configurable Q7 coefficients via UART 9600 8N1. 8-bit signed input/output with saturation."
  language:     "Verilog"
  clock_hz:     25000000

  tiles: "1x1"

  top_module:  "tt_um_fir_filter"

  source_files:
    - "uart_rx.v"
    - "fir_filter.v"
    - "coeff_ctrl.v"
    - "tt_um_fir_filter.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "Sample in bit 0 (LSB)"
  ui[1]: "Sample in bit 1"
  ui[2]: "Sample in bit 2"
  ui[3]: "Sample in bit 3"
  ui[4]: "Sample in bit 4"
  ui[5]: "Sample in bit 5"
  ui[6]: "Sample in bit 6"
  ui[7]: "Sample in bit 7 (MSB, sign)"

  # Outputs
  uo[0]: "Filtered output bit 0 (LSB)"
  uo[1]: "Filtered output bit 1"
  uo[2]: "Filtered output bit 2"
  uo[3]: "Filtered output bit 3"
  uo[4]: "Filtered output bit 4"
  uo[5]: "Filtered output bit 5"
  uo[6]: "Filtered output bit 6"
  uo[7]: "Filtered output bit 7 (MSB, sign)"

  # Bidirectional pins
  uio[0]: "UART RX - coefficient programming 9600 8N1 (input)"
  uio[1]: "UART TX - reserved, tie HIGH (output)"
  uio[2]: "sample_valid - pulse to process ui_in (input)"
  uio[3]: "out_valid - pulses when uo_out ready (output)"
  uio[4]: "coeff_we - pulses when coefficients updated (output)"
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
