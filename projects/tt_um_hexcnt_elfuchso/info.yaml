# Tiny Tapeout project information
project:
  title:        "(Hexa)Decimal Counter"      # Project title
  author:       "Maximilian Fuchs"      # Your name
  discord:      "elfuchso"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Counts up using the slowed down clock and displays it in a configurable base on the 7 segment display"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_hexcnt_elfuchso"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Up (1) / Down (0)"
  ui[1]: "Hex (1) / Dec (0)"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "seg_a"
  uo[1]: "seg_b"
  uo[2]: "seg_c"
  uo[3]: "seg_d"
  uo[4]: "seg_e"
  uo[5]: "seg_f"
  uo[6]: "seg_g"
  uo[7]: "dot (Hex Mode Ind)"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
