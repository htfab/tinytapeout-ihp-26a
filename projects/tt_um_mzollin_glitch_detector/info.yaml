# Tiny Tapeout project information
project:
  title:        "Glitch Detector"
  author:       "Marco Zollinger"
  discord:      "freelancer917"
  description:  "Detector circuit for glitching attacks against the TT chip"
  language:     "Verilog"
  clock_hz:     25000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_mzollin_glitch_detector"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Test trigger input"
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Detector 0 trigger status"
  uo[1]: "Detector 1 trigger status"
  uo[2]: "Detector 2 trigger status"
  uo[3]: "Detector 3 trigger status"
  uo[4]: "Detector 4 trigger status"
  uo[5]: "Detector 5 trigger status"
  uo[6]: "Detector 6 trigger status"
  uo[7]: "Detector 7 trigger status"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
