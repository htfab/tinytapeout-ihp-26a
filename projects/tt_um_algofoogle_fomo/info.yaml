# Tiny Tapeout project information
project:
  title:        "FOMO"
  author:       "algofoogle (Anton Maurovic)"
  discord:      "algofoogle"
  description:  "Fear Of Missing Out on TTIHP26a!"
  language:     "Mixed"
  clock_hz:     0

  # How many tiles your design occupies? A single tile is about 200x150 uM.
  tiles: "1x1"          # Valid values for analog projects: 1x2, 2x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_algofoogle_fomo"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:        
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "sel_n[0]"
  ui[1]: "sel_n[1]"
  ui[2]: "sel_n[2]"
  ui[3]: "sel_n[3]"
  ui[4]: "sel[0]"
  ui[5]: "sel[1]"
  ui[6]: "sel[2]"
  ui[7]: "sel[3]"

  # Outputs
  uo[0]: "div8"
  uo[1]: "div16"
  uo[2]: "div32"
  uo[3]: "div64"
  uo[4]: "div128"
  uo[5]: "div256"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: "ring_enb"
  uio[1]: "VGND"
  uio[2]: "VGND"
  uio[3]: "VGND"
  uio[4]: "VGND"
  uio[5]: "VGND"
  uio[6]: "VGND"
  uio[7]: "VDPWR"

# Do not change!
yaml_version: 6
