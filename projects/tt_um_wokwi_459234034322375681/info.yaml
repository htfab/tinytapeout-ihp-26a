# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     459234034322375681              # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "TinyTapeout Signal Box"        # Project title
  author:       "Pascal"                        # Your name
  discord:      ""                              # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Signal Box v1"                 # One line description of what your project does
  language:     "Wokwi"                         # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0                               # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "q0_i"
  ui[1]: "q1_i"
  ui[2]: "q2_i"
  ui[3]: "q3_i"
  ui[4]: "q4_i"
  ui[5]: "q5_i"
  ui[6]: "q6_i"
  ui[7]: "q7_i"

  # Outputs
  uo[0]: "s1_o"
  uo[1]: "s2_o"
  uo[2]: "s3_o"
  uo[3]: "s4_o"
  uo[4]: "s5_o"
  uo[5]: "s6_o"
  uo[6]: "s7_o"
  uo[7]: "s8_o"

  # Bidirectional pins
  uio[0]: "x_o"
  uio[1]: "a_o"
  uio[2]: "b_o"
  uio[3]: "c_o"
  uio[4]: "d_o"
  uio[5]: "ef_o"
  uio[6]: "gh_o"
  uio[7]: "ij_o"

# Do not change!
yaml_version: 6
