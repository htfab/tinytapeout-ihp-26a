# Tiny Tapeout project information
project:
  title:        "Linear Timecode (LTC) generator with I2C control"      # Project title
  author:       "Thomas Flummer"      # Your name
  discord:      "thomasflummer"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Timecode generator for audio video syncronization"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     24000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_flummer_ltc"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "i2c_if/i2cSlave_define.v"
    - "i2c_if/i2c_if_no_bidir.v"
    - "i2c_if/timescale.v"
    - "i2c_if/serialInterface.v"
    - "rb_ltc/rb_ltc.v"
    - "ltc.v"
    - "tt_um_flummer_ltc.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: "FRAMERATE_0"
  ui[3]: "FRAMERATE_1"
  ui[4]: "DF"
  ui[5]: "CF"
  ui[6]: "BGF_0"
  ui[7]: "BGF_1"

  # Outputs
  uo[0]: "FRAMERATE_DEBUG_7SEG"
  uo[1]: "FRAMERATE_DEBUG_7SEG"
  uo[2]: "FRAMERATE_DEBUG_7SEG"
  uo[3]: "FRAMERATE_DEBUG_7SEG"
  uo[4]: "FRAMERATE_DEBUG_7SEG"
  uo[5]: "FRAMERATE_DEBUG_7SEG"
  uo[6]: "FRAMERATE_DEBUG_7SEG"
  uo[7]: "REG_CONF_ACTIVE"

  # Bidirectional pins
  uio[0]: "I2C_SDA"
  uio[1]: "I2C_SCL"
  uio[2]: ""
  uio[3]: ""
  uio[4]: "DEBUG OUTPUT"
  uio[5]: "DEBUG OUTPUT"
  uio[6]: ""
  uio[7]: "LTC_OUT"

# Do not change!
yaml_version: 6
