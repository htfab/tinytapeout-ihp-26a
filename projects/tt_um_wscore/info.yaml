# Tiny Tapeout project information
project:
  title:        "8-bit RISC-V Lite CPU"
  author:       "Wiwathana Son"
  discord:      "" 
  description:  "8-bit CPU with hardware multiplier, 32B RAM, and custom branching instructions."
  language:     "Verilog"
  clock_hz:     10000000       # Targeted for 10MHz

  # How many tiles your design occupies? 
  tiles: "1x2"          

  # Your top module name:
  top_module:  "tt_um_wscore"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs (Monitoring the 'rd' register)
  uo[0]: "reg_out[0]"
  uo[1]: "reg_out[1]"
  uo[2]: "reg_out[2]"
  uo[3]: "reg_out[3]"
  uo[4]: "reg_out[4]"
  uo[5]: "reg_out[5]"
  uo[6]: "reg_out[6]"
  uo[7]: "reg_out[7]"

  # Bidirectional pins (Address Bus + Control)
  uio[0]: "addr[0]"
  uio[1]: "addr[1]"
  uio[2]: "addr[2]"
  uio[3]: "addr[3]"
  uio[4]: "addr[4]"
  uio[5]: "addr[5]"      # Unused (available for RAM expansion)
  uio[6]: "addr[6]"      # Unused (available for RAM expansion)
  uio[7]: "mode_sel"     # 0: LOAD (Bootloader), 1: RUN

# Do not change!
yaml_version: 6
