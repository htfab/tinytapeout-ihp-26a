# Tiny Tapeout project information
project:
  title:        "tt_gian_alu"      # Project title
  author:       "Gianmarco Fortunelli"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Tiny Tapeout 32-bit ALU with integrated multiplier and nibble-based serial I/O interface."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     50000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_gian_alu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_gian_alu_transpiled.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "ext_progr (start/hold transaction)"
  ui[1]: "unused"
  ui[2]: "unused"
  ui[3]: "unused"
  ui[4]: "in_data[0] (LSB of input nibble)"
  ui[5]: "in_data[1]"
  ui[6]: "in_data[2]"
  ui[7]: "in_data[3] (MSB of input nibble)"

  # Outputs
  uo[0]: "result_valid"
  uo[1]: "frame_error"
  uo[2]: "busy"
  uo[3]: "unused"
  uo[4]: "out_data[0] (LSB of output nibble)"
  uo[5]: "out_data[1]"
  uo[6]: "out_data[2]"
  uo[7]: "out_data[3] (MSB of output nibble)"

  # Bidirectional pins
  uio[0]: "unused"
  uio[1]: "unused"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
